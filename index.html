<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster | Play vs Stockfish</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Chess.js for game rules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <!-- Feedback Modal -->
    <div id="feedback-modal" class="start-menu-overlay hidden" style="z-index: 2000;">
        <div class="glass-panel menu-panel" style="max-width: 550px;">
            <h2 id="feedback-title" style="font-size: 2.2rem; margin-bottom: 1.5rem; color: var(--text-primary);">Puzzle Complete</h2>
            <p id="feedback-text" style="color: var(--text-secondary); font-size: 1.15rem; line-height: 1.6; margin-bottom: 2rem; white-space: pre-wrap; text-align: left;"></p>
            <button id="btn-close-feedback" class="btn primary btn-large" style="width: 100%;">Return to Main Menu</button>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="start-menu-overlay">
        <div class="glass-panel menu-panel">
            <div class="brand menu-brand">
                <div class="logo-icon">♞</div>
                <h1>Grandmaster</h1>
            </div>
            <p>Select a game mode to begin.</p>
            <div class="menu-buttons">
                <!-- Normal Game Options -->
                <div style="display: flex; gap: 0.5rem; width: 100%;">
                    <button id="btn-normal-white" class="btn primary btn-large" style="flex: 1;">Play as White</button>
                    <button id="btn-normal-black" class="btn primary btn-large" style="flex: 1; background: #334155; color: #e2e8f0; border: 1px solid #475569;">Play as Black</button>
                </div>
                
                <p style="margin: 0.75rem 0; color: var(--text-secondary); font-size: 0.875rem;">— OR —</p>
                
                <button id="btn-tactics" class="btn secondary btn-large">Tactics Puzzle</button>
            </div>
        </div>
    </div>

    <div class="app-container hidden" id="app-content">
        <!-- Sidebar: Game Info -->
        <aside class="sidebar left-sidebar">
            <div class="glass-panel">
                <div class="brand">
                    <div class="logo-icon">♞</div>
                    <h1>Grandmaster</h1>
                </div>
                
                <div class="game-status">
                    <h2 id="status">White to move</h2>
                    <p id="pgn-container"></p>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <label for="difficulty-select" style="font-size: 0.875rem; color: var(--text-secondary); display: block; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">AI Strength</label>
                        <select id="difficulty-select" class="btn secondary" style="width: 100%; text-align: left; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%23f8fafc%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 10px center;">
                            <option value="easy" style="background: #1e293b; color: #fff;">Easy</option>
                            <option value="medium" selected style="background: #1e293b; color: #fff;">Medium</option>
                            <option value="hard" style="background: #1e293b; color: #fff;">Hard</option>
                        </select>
                    </div>
                    <button id="btn-menu" class="btn primary" style="margin-top: 0.5rem;">Main Menu</button>
                    <button id="btn-undo" class="btn secondary">Undo Move</button>
                </div>
            </div>
        </aside>

        <!-- Main Content: Chess Board -->
        <main class="board-container">
            <div class="glass-panel board-panel">
                <!-- Opponent Info -->
                <div class="player-info top-player">
                    <div class="avatar engine-avatar">🤖</div>
                    <div class="player-details">
                        <span class="player-name">Stockfish Engine</span>
                        <span class="player-rating">Level 10</span>
                    </div>
                </div>

                <!-- The Board -->
                <div id="board" class="chess-board"></div>

                <!-- User Info -->
                <div class="player-info bottom-player">
                    <div class="avatar user-avatar">👤</div>
                    <div class="player-details">
                        <span class="player-name">You</span>
                        <span class="player-rating">1500</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/puzzles.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
